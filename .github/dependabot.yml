version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "react"
        versions: [">=20.0.0"]
    labels:
      - "dependencies"
      - "automated"
    reviewers: []
